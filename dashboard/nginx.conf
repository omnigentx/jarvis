server {
    listen 80;
    server_name _;

    # --- Security Headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # Limit request body size (16MB for audio uploads)
    client_max_body_size 16m;

    root /usr/share/nginx/html;
    index index.html;

    # Vue SPA routing — all non-API paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # All API requests → backend
    location /api/ {
        proxy_pass http://jarvis-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support (chat-stream, activity-stream)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Hands-free voice WebSocket. Without this block requests for
    # /ws/voice fall through to the SPA fallback (index.html) and the
    # browser reports "WebSocket failed to open". The Upgrade/Connection
    # headers + HTTP/1.1 are required for nginx to perform the WS
    # handshake; long read_timeout keeps idle hands-free sessions alive.
    location /ws/ {
        proxy_pass http://jarvis-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
