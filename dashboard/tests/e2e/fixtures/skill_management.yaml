# Skill management flows on AgentDetail.
#
# AgentDetail fetches:
#   • GET /api/agents            (via the agents store, on app boot)
#   • GET /api/agents/{name}     (full detail incl. resolved skills)
#   • GET /api/skills            (new — for is_builtin / used_by lookup)
#
# Skill CRUD endpoints (new):
#   • GET    /api/skills/_template
#   • GET    /api/skills/{name}
#   • POST   /api/skills
#   • PUT    /api/skills/{name}
#   • DELETE /api/skills/{name}
#
# We use sequential responses for endpoints where the test mutates state
# (PUT, DELETE → list refresh) so the second/third hits return the post-edit
# view. The mock-backend respects fixture array order and reuses the LAST
# entry once exhausted, which fits the "stable post-mutation" shape.

backend_source:
  - "backend/routes/agents.py::get_agent"
  - "backend/routes/skills.py::list_skills_route, get_skill_route, create_skill_route, update_skill_route, delete_skill_route"
  - "dashboard/src/views/AgentDetail.vue::fetchSkillsMeta, openEditSkill, openCreateSkill, openDeleteSkill"
  - "dashboard/src/components/agent/SkillEditorModal.vue"
  - "dashboard/src/components/agent/SkillDeleteModal.vue"

responses:
  # Roster fetch (agents store).
  "GET /api/agents":
    status: 200
    json:
      - name: "TestAgent"
        status: "idle"
        type: "static"
        model: "gpt-4o-mini"
        is_default: false

  # Activity recent — store onMount fetches it; not relevant to the flow.
  "GET /api/agents/activities/recent":
    status: 200
    json: {}

  # Token usage — header polls this; harmless empty payload.
  "GET /api/usage/agents":
    status: 200
    json: { agents: [] }

  # Agent detail. Returns 2 skills: one user-created (deletable) and one
  # builtin (edit-only). After save/delete we refetch — sequential entries
  # let us return updated content/state on the second call.
  "GET /api/agents/TestAgent":
    - status: 200
      json:
        name: "TestAgent"
        status: "idle"
        type: "static"
        model: "gpt-4o-mini"
        instruction: "You are a test agent."
        servers: []
        tools: {}
        skills:
          - name: "my-custom"
            description: "A user-created skill."
            content: "---\nname: my-custom\ndescription: A user-created skill.\n---\n\nUser body.\n"
          - name: "audio-reading"
            description: "Built-in audio reader."
            content: "---\nname: audio-reading\ndescription: Built-in audio reader.\n---\n\nBuiltin body.\n"
    - status: 200
      json:
        name: "TestAgent"
        status: "idle"
        type: "static"
        model: "gpt-4o-mini"
        instruction: "You are a test agent."
        servers: []
        tools: {}
        skills:
          - name: "my-custom"
            description: "Updated description after save."
            content: "---\nname: my-custom\ndescription: Updated description after save.\n---\n\nNew body.\n"
          - name: "audio-reading"
            description: "Built-in audio reader."
            content: "---\nname: audio-reading\ndescription: Built-in audio reader.\n---\n\nBuiltin body.\n"

  # Skill list — used to populate is_builtin / used_by.
  "GET /api/skills":
    - status: 200
      json:
        skills:
          - name: "my-custom"
            description: "A user-created skill."
            is_builtin: false
            used_by: ["TestAgent"]
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "audio-reading"
            description: "Built-in audio reader."
            is_builtin: true
            used_by: ["TestAgent", "AudioReaderAgent"]
            mtime_ns: "1700000000000000000"
            parse_error: null
    - status: 200
      json:
        skills:
          - name: "my-custom"
            description: "Updated description after save."
            is_builtin: false
            used_by: ["TestAgent"]
            mtime_ns: "1700000000999999999"
            parse_error: null
          - name: "audio-reading"
            description: "Built-in audio reader."
            is_builtin: true
            used_by: ["TestAgent", "AudioReaderAgent"]
            mtime_ns: "1700000000000000000"
            parse_error: null

  # Single-skill GET — fired when the editor modal opens in edit mode.
  "GET /api/skills/my-custom":
    status: 200
    json:
      name: "my-custom"
      description: "A user-created skill."
      content: "---\nname: my-custom\ndescription: A user-created skill.\n---\n\nUser body.\n"
      is_builtin: false
      used_by: ["TestAgent"]
      mtime_ns: "1700000000000000000"
      parse_error: null

  "GET /api/skills/audio-reading":
    status: 200
    json:
      name: "audio-reading"
      description: "Built-in audio reader."
      content: "---\nname: audio-reading\ndescription: Built-in audio reader.\n---\n\nBuiltin body.\n"
      is_builtin: true
      used_by: ["TestAgent", "AudioReaderAgent"]
      mtime_ns: "1700000000000000000"
      parse_error: null

  # PUT update — first call succeeds, second returns 409 to exercise the
  # conflict UI in a separate test (we drive the same endpoint from two
  # tests; mock-backend resets between tests in the same file? No — it
  # resets between `test()` blocks because each one calls mockBackend()).
  # So the sequential entries here only matter if a single test calls PUT
  # twice; for now keep one entry — the conflict case uses a dedicated
  # fixture below.
  "PUT /api/skills/my-custom":
    status: 200
    json:
      name: "my-custom"
      description: "Updated description after save."
      content: "---\nname: my-custom\ndescription: Updated description after save.\n---\n\nNew body.\n"
      is_builtin: false
      used_by: ["TestAgent"]
      mtime_ns: "1700000000999999999"
      parse_error: null

  # POST create — succeeds.
  "POST /api/skills":
    status: 201
    json:
      name: "brand-new"
      description: "Brand new skill."
      content: "---\nname: brand-new\ndescription: Brand new skill.\n---\n\nNew skill body.\n"
      is_builtin: false
      used_by: []
      mtime_ns: "1700000001000000000"
      parse_error: null

  # DELETE user skill — succeeds.
  "DELETE /api/skills/my-custom":
    status: 200
    json:
      deleted: true
      name: "my-custom"
      removed_from_agents: ["TestAgent"]
      warning: null

  # Template — used by create-mode editor.
  "GET /api/skills/_template":
    status: 200
    json:
      content: |
        ---
        name: my-skill
        description: One-line description of what this skill does.
        ---

        # my-skill

        ## When to use
        - Trigger condition

sse_streams:
  "/api/agents/activity-stream":
    - { event: "ping", data: {} }
