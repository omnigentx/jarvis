# Wizard Step 3 (Services), Google OAuth client NOT yet configured.
#
# Fresh-install scenario: user finished Step 1 (auth) + Step 2 (LLM), now
# lands on Step 3. The Google OAuth client.json hasn't been uploaded yet;
# /api/oauth/google/status returns client_type "none" so the wizard
# renders the credential paste form INLINE (instead of punting to the
# gated /settings route).
#
# Sequential responses on /api/oauth/google/status:
#   1st call (mount)       → client_type "none" → form visible
#   2nd call (after PUT)   → client_type "web", not connected → Connect button
#
# This fixture also stubs PUT /api/oauth/google/client so the test can
# verify the credential-save round-trip.

backend_source:
  - "backend/routes/setup.py::get_setup_status, auth_probe"
  - "backend/routes/oauth.py::status, set_client"
  - "backend/middleware/setup_gate.py (allows /api/oauth)"
  - "dashboard/src/components/GoogleOAuthCard.vue::saveClient"

responses:
  "GET /api/setup/auth/probe":
    status: 200
    json:
      configured: true

  "GET /api/setup/status":
    status: 200
    json:
      steps:
        - { name: "auth",        completed: true,  skipped: false }
        - { name: "llm",         completed: true,  skipped: false }
        - { name: "services",    completed: false, skipped: false }
        - { name: "yaml_config", completed: false, skipped: false }
        - { name: "verify",      completed: false, skipped: false }
      overall_complete: false
      current_step: "services"

  # Sequential: first call (mount) returns "none"; second call (after the
  # PUT to /client refreshes status) returns "web, not connected".
  "GET /api/oauth/google/status":
    - status: 200
      json:
        client_configured: false
        client_type: "none"
        desktop_redirect_uri: null
        connected: false
        scopes: []
        expires_at: null
        has_refresh_token: false
        project_number: null
        required_apis: []
    - status: 200
      json:
        client_configured: true
        client_type: "web"
        desktop_redirect_uri: null
        connected: false
        scopes: []
        expires_at: null
        has_refresh_token: false
        project_number: "123456789012"
        required_apis: []

  # User pastes credentials and clicks Save — backend persists the client
  # and returns 200. GoogleOAuthCard then refetches /status (above).
  "PUT /api/oauth/google/client":
    status: 200
    json:
      saved: true
      client_type: "web"
