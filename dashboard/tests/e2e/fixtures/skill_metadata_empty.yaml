# Regression fixture: /api/skills returns an empty list (simulates a backend
# that hasn't been restarted to pick up the new route, or a transient failure
# that the silent-catch in fetchSkillsMeta swallowed). In this state the
# Delete button on EVERY skill — including built-ins — must be disabled.
#
# Drives test "Skills tab — delete stays disabled when /api/skills metadata
# is missing" in skill-management.spec.ts.

backend_source:
  - "dashboard/src/views/AgentDetail.vue::isSkillBuiltin tri-state guard"

responses:
  "GET /api/agents":
    status: 200
    json:
      - name: "TestAgent"
        status: "idle"
        type: "static"
        model: "gpt-4o-mini"
        is_default: false

  "GET /api/agents/activities/recent":
    status: 200
    json: {}

  "GET /api/usage/agents":
    status: 200
    json: { agents: [] }

  "GET /api/agents/TestAgent":
    status: 200
    json:
      name: "TestAgent"
      status: "idle"
      type: "static"
      model: "gpt-4o-mini"
      instruction: "You are a test agent."
      servers: []
      tools: {}
      skills:
        - name: "user-context"
          description: "Built-in user-context skill."
          content: "---\nname: user-context\ndescription: Built-in user-context skill.\n---\n\nUser context body.\n"

  # Empty list — same shape the route uses but with zero entries.
  "GET /api/skills":
    status: 200
    json:
      skills: []

sse_streams:
  "/api/agents/activity-stream":
    - { event: "ping", data: {} }
