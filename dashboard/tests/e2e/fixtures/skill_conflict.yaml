# Skill PUT conflict (mtime mismatch) — separate fixture so the test that
# drives this path does not also need to fight the happy-path 200 entry.

backend_source:
  - "backend/services/skill_service.py::update_skill optimistic-lock branch"

responses:
  "GET /api/agents":
    status: 200
    json:
      - name: "TestAgent"
        status: "idle"
        type: "static"
        model: "gpt-4o-mini"
        is_default: false

  "GET /api/agents/activities/recent":
    status: 200
    json: {}

  "GET /api/usage/agents":
    status: 200
    json: { agents: [] }

  "GET /api/agents/TestAgent":
    status: 200
    json:
      name: "TestAgent"
      status: "idle"
      type: "static"
      model: "gpt-4o-mini"
      instruction: "You are a test agent."
      servers: []
      tools: {}
      skills:
        - name: "my-custom"
          description: "A user-created skill."
          content: "---\nname: my-custom\ndescription: A user-created skill.\n---\n\nUser body.\n"

  "GET /api/skills":
    status: 200
    json:
      skills:
        - name: "my-custom"
          description: "A user-created skill."
          is_builtin: false
          used_by: ["TestAgent"]
          mtime_ns: "1700000000000000000"
          parse_error: null

  "GET /api/skills/my-custom":
    - status: 200
      json:
        name: "my-custom"
        description: "A user-created skill."
        content: "---\nname: my-custom\ndescription: A user-created skill.\n---\n\nUser body.\n"
        is_builtin: false
        used_by: ["TestAgent"]
        mtime_ns: "1700000000000000000"
        parse_error: null
    # On Reload, return the "newer" disk content with bumped mtime.
    - status: 200
      json:
        name: "my-custom"
        description: "External edit happened."
        content: "---\nname: my-custom\ndescription: External edit happened.\n---\n\nFresh body from disk.\n"
        is_builtin: false
        used_by: ["TestAgent"]
        mtime_ns: "1700000099999999999"
        parse_error: null

  # The first PUT: client sent the stale mtime → 409.
  "PUT /api/skills/my-custom":
    status: 409
    json:
      detail:
        message: "Skill has been modified elsewhere. Reload to see the latest version."
        current_mtime_ns: "1700000099999999999"

sse_streams:
  "/api/agents/activity-stream":
    - { event: "ping", data: {} }
