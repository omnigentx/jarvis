# Chat SSE streaming — agent reply contains rich Markdown + a Mermaid block.
#
# We're verifying the dashboard upgrade from PR `feat/md-mermaid-tts-scoping`:
# agent text used to render via plain `{{ msg.content }}` in ChatMessages.vue,
# now goes through MarkdownRenderer which:
#   1. parses headings/bold/lists/code with `marked` + `highlight.js`
#   2. lazy-imports `mermaid` and renders ```mermaid blocks as inline SVG
#   3. sanitizes the final HTML with DOMPurify (svg tags allow-listed)
#
# The fixture only differs from chat_streaming_happy in the `done.response`
# payload — everything else is identical so the harness behaves the same.

backend_source:
  - "backend/routes/chat.py::chat_stream"
  - "dashboard/src/components/MarkdownRenderer.vue::render + renderMermaidBlocks"
  - "dashboard/src/components/chat/ChatMessages.vue::agent bubble"

responses:
  "GET /api/conversations":
    status: 200
    json: []

  "GET /api/agents":
    status: 200
    json:
      - name: "Jarvis"
        description: "Main orchestrator"
        status: "idle"
        is_default: true
        team_name: null

  "GET /api/agents/activities/recent":
    status: 200
    json: {}

sse_streams:
  "/api/chat-stream":
    - data:
        type: "start"
        message: "Processing..."
    - data:
        type: "done"
        response: |-
          # Sprint plan

          Here's the proposed flow with **two phases** and a quick `npm test`
          check before we ship.

          - Phase 1 — backend
          - Phase 2 — frontend

          ```mermaid
          flowchart LR
              A[Backend ready] --> B[Frontend wired]
              B --> C[Ship]
          ```
        audio: null
        conversation_id: "e2e-conv-md-001"
        total_tokens: { input: 10, output: 30, reasoning: 0, cache_read: 0 }
