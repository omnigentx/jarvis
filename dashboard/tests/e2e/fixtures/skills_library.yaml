# Skills library page + attach/detach flows.
#
# Two card-based agents (FinanceAgent, ResearchAgent — persistable attach)
# and one code-based (Jarvis — runtime-only attach with warning). The
# library lists 4 skills: 1 builtin attached, 1 builtin orphan,
# 1 user-created attached, 1 user-created orphan.

backend_source:
  - "backend/routes/skills.py::list_skills_route, attach_skill_route, detach_skill_route"
  - "backend/services/skill_service.py::attach_skill_to_agent, detach_skill_from_agent"
  - "dashboard/src/views/SkillsLibraryView.vue"

responses:
  "GET /api/agents":
    status: 200
    json:
      - name: "Jarvis"
        status: "idle"
        type: "builtin"
        model: "gpt-4o-mini"
        is_default: true
      - name: "FinanceAgent"
        status: "idle"
        type: "card"
        model: "gpt-4o-mini"
        is_default: false
      - name: "ResearchAgent"
        status: "idle"
        type: "card"
        model: "gpt-4o-mini"
        is_default: false

  "GET /api/agents/activities/recent":
    status: 200
    json: {}

  "GET /api/usage/agents":
    status: 200
    json: { agents: [] }

  "GET /api/skills":
    - status: 200
      json:
        skills:
          - name: "user-context"
            description: "Built-in user context."
            is_builtin: true
            used_by: ["Jarvis"]
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "audio-reading"
            description: "Built-in audio reader."
            is_builtin: true
            used_by: []
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "my-attached"
            description: "User skill, attached to FinanceAgent."
            is_builtin: false
            used_by: ["FinanceAgent"]
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "orphan-skill"
            description: "Created but not attached anywhere."
            is_builtin: false
            used_by: []
            mtime_ns: "1700000000000000000"
            parse_error: null
    # After an attach we re-fetch — orphan-skill now references FinanceAgent.
    - status: 200
      json:
        skills:
          - name: "user-context"
            description: "Built-in user context."
            is_builtin: true
            used_by: ["Jarvis"]
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "audio-reading"
            description: "Built-in audio reader."
            is_builtin: true
            used_by: []
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "my-attached"
            description: "User skill, attached to FinanceAgent."
            is_builtin: false
            used_by: ["FinanceAgent"]
            mtime_ns: "1700000000000000000"
            parse_error: null
          - name: "orphan-skill"
            description: "Created but not attached anywhere."
            is_builtin: false
            used_by: ["FinanceAgent"]
            mtime_ns: "1700000000000000001"
            parse_error: null

  # Attach orphan-skill -> FinanceAgent (card-based, persisted=true).
  "PUT /api/skills/orphan-skill/agents/FinanceAgent":
    status: 200
    json:
      agent: "FinanceAgent"
      skill: "orphan-skill"
      persisted: true
      skills:
        - name: "finance"
          description: "Finance skill."
          content: ""
        - name: "orphan-skill"
          description: "Created but not attached anywhere."
          content: ""

  # Attach orphan-skill -> Jarvis (code-based, persisted=false).
  "PUT /api/skills/orphan-skill/agents/Jarvis":
    status: 200
    json:
      agent: "Jarvis"
      skill: "orphan-skill"
      persisted: false
      skills:
        - name: "user-context"
          description: "Built-in user context."
          content: ""
        - name: "orphan-skill"
          description: "Created but not attached anywhere."
          content: ""

  # Detach my-attached from FinanceAgent.
  "DELETE /api/skills/my-attached/agents/FinanceAgent":
    status: 200
    json:
      agent: "FinanceAgent"
      skill: "my-attached"
      persisted: true
      skills: []

sse_streams:
  "/api/agents/activity-stream":
    - { event: "ping", data: {} }
