# Token Usage — populated response.
#
# Boot sequence for /token-usage:
#   1. AppLayout mounts → GET /api/notifications/unread-count + activity /
#      scheduler SSE streams (covered by _app_boot_noise.yaml).
#   2. TokenUsage.vue onMounted → GET /api/metrics/tokens?period=24h (default).
#
# Backend contract: routes/token_usage.py::get_token_metrics returns
#   { period, totals, agents[], models[] }.  All cache fields are unified
#   server-side as `cached_tokens` (= cache_hit_tokens + cache_read_tokens).
#   agents[] and models[] are sorted by total_tokens desc.
#
# Numbers picked so fmt helpers (src/views/TokenUsage.vue::fmtTokens / fmtCost)
# produce stable, human-readable strings the spec can pin exactly:
#   fmtTokens(1_234_500)   => "1.2M"     (>=1M branch)
#   fmtTokens(800_000)     => "800.0K"   (>=1K branch)
#   fmtCost(12.34)         => "$12.34"   (>=0.01 branch)
#   fmtCost(8.20)          => "$8.20"
# Totals below equal the sum of the three agent rows (contract invariant).

backend_source:
  - "backend/routes/token_usage.py::get_token_metrics"
  - "backend/services/pricing.py::get_model_pricing"
  - "dashboard/src/views/TokenUsage.vue::fetchMetrics"
  - "dashboard/src/api.js::apiFetch"

notes: |
  Three agents + two models so the Agent Breakdown table and the "By Model"
  panel both render multiple rows.  Agent order here matches the sorted-by-
  total_tokens output the real endpoint would produce.

responses:
  "GET /api/metrics/tokens":
    status: 200
    json:
      period: "24h"
      totals:
        input_tokens: 900000
