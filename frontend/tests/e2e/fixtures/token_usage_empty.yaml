# Token Usage — empty/zero state (negative control).
#
# The endpoint returns zeroed totals and empty arrays when no LLM calls have
# been recorded in the requested period.  The UI must render without crashing
# AND show its empty-state copy instead of an empty bar chart / table.
#
# Empty-state strings are hard-coded in TokenUsage.vue:
#   - Bar chart:  "No token data for this period"
#   - By Model:   "No data"
#   - Breakdown:  "No token usage recorded for this period."

backend_source:
  - "backend/routes/token_usage.py::get_token_metrics"
  - "dashboard/src/views/TokenUsage.vue::fetchMetrics"

responses:
  "GET /api/metrics/tokens":
    status: 200
    json:
      period: "24h"
      totals:
        input_tokens: 0
        output_tokens: 0
        total_tokens: 0
        cached_tokens: 0
        reasoning_tokens: 0
        est_cost: 0.0
        llm_calls: 0
      agents: []
      models: []
