# Crawl banner i18n — chat `done` event carries crawl_job_id, ChatView tracks
# it via useCrawlStatus (polls GET /api/stories/crawl/status/{id}) and renders
# the progress strip. The spec asserts the strip's copy follows the topbar
# Vi/En toggle LIVE (shared useLang ref), per CLAUDE.md §7 bilingual rule.

backend_source:
  - "backend/routes/chat.py::chat_stream (crawl_job_id on done event)"
  - "backend/routes/stories.py::crawl_status"
  - "dashboard/src/views/ChatView.vue::crawl banner template"
  - "dashboard/src/composables/useCrawlStatus.js::track/_poll"
  - "dashboard/src/composables/useLang.js"

responses:
  "GET /api/conversations":
    status: 200
    json:
      items: []
      total: 0

  "GET /api/agents":
    status: 200
    json:
      - name: "Jarvis"
        description: "Main orchestrator"
        status: "idle"
        is_default: true
        team_name: null

  "GET /api/agents/activities/recent":
    status: 200
    json: {}

  # useCrawlStatus._poll — keep the job mid-flight so the banner stays in the
  # "downloading" branch (isActive) for the whole spec.
  "GET /api/stories/crawl/status/e2e-crawl-lang-1":
    status: 200
    json:
      status: "running"
      story_title: "Test Story"
      current: 3
      total: 10

sse_streams:
  "/api/chat-stream":
    - data:
        type: "start"
        message: "Processing..."
    - data:
        type: "done"
        response: "Started downloading the story."
        audio: null
        conversation_id: "e2e-conv-crawl-lang-001"
        crawl_job_id: "e2e-crawl-lang-1"
        total_tokens: { input: 10, output: 8, reasoning: 0, cache_read: 0 }
