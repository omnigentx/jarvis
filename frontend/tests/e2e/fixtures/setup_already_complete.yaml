# Negative control: setup already completed. The wizard should show the
# Verify step (route name SetupVerify) and NOT auto-push the user back to
# step 1.  Useful for catching regressions where a store refactor forgets
# the "already-complete → stay on Verify" branch.

backend_source:
  - "backend/routes/setup.py::get_setup_status"
  - "dashboard/src/views/setup/SetupWizard.vue::watch overallComplete"

responses:
  "GET /api/setup/auth/probe":
    status: 200
    json: { configured: true }

  "GET /api/setup/status":
    status: 200
    json:
      steps:
        - { name: "auth",        completed: true, skipped: false, completed_at: 1700000000.0 }
        - { name: "llm",         completed: true, skipped: false, completed_at: 1700000001.0 }
        - { name: "services",    completed: true, skipped: false, completed_at: 1700000002.0 }
        - { name: "yaml_config", completed: true, skipped: false, completed_at: 1700000003.0 }
        - { name: "verify",      completed: true, skipped: false, completed_at: 1700000004.0 }
      overall_complete: true
      current_step: null
