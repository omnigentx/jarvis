# Stories library + one story's chapters + happy-path play response.
#
# Flow:
#   1. /stories mounts → GET /api/stories (story list).
#   2. Click story → /stories/:storyId mounts ChapterList →
#      GET /api/stories/:storyId/chapters + SSE /api/stories/pregen-stream.
#   3. Click a chapter's play button → POST /api/stories/:storyId/:filename/play
#      returns { audio_url: "/api/tts/..." } which the audio element then fetches.
#
# The /api/tts/... response here is a stub — tests assert on the API
# call contract, not on actual audio decoding. See the spec's note about
# headless-browser audio caveats.

backend_source:
  - "backend/routes/stories.py::list_local_stories"
  - "backend/routes/stories.py::list_story_chapters"
  - "backend/routes/stories.py::play_local_chapter"
  - "backend/routes/stories.py::pregen_stream"
  - "backend/routes/tts.py::get_tts_audio"
  - "dashboard/src/views/StoriesView.vue::fetchStories"
  - "dashboard/src/components/stories/ChapterList.vue::fetchChapters"
  - "dashboard/src/stores/audioPlayer.js::playChapter"

notes: |
  Shape mirrors backend: list entries use {id, title, chapters}; chapters list
  uses {file, preload} with preload ∈ {ready, generating, none}. play returns
  {audio_url, status?, duration?}.

responses:
  "GET /api/stories":
    status: 200
    json:
      - { id: "alpha_story",   title: "Alpha Story",   chapters: 3 }
      - { id: "beta_tale",     title: "Beta Tale",     chapters: 2 }
      - { id: "gamma_chronicles", title: "Gamma Chronicles", chapters: 5 }

  "GET /api/stories/alpha_story/chapters":
    status: 200
    json:
      - { file: "0001_prologue.txt", preload: "ready" }
      - { file: "0002_chapter_two.txt", preload: "none" }
      - { file: "0003_chapter_three.txt", preload: "none" }

  "POST /api/stories/alpha_story/0001_prologue.txt/play":
    status: 200
    json:
      audio_url: "/api/tts/story_alpha_story_0001_prologue.txt"
      status: "ready"
      duration: 42

  # Audio element fetches the audio_url after the play POST. We stub with an
  # empty body + audio/mpeg so the <audio> errors silently — the test asserts
  # on the API call pattern, not on playback success.
  "GET /api/tts/story_alpha_story_0001_prologue.txt":
    status: 200
    headers:
      content-type: "audio/mpeg"
    text: ""

sse_streams:
  # ChapterList connects to pregen-stream on mount. Send a single queue_update
  # with an empty queue so the UI just renders the static preload state.
  "/api/stories/pregen-stream":
    - { event: "queue_update", data: { queue: [] } }
