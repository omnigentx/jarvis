# Shared noise fixture — requests every page fires on app boot that are
# orthogonal to the flow being tested. Merge this with any flow fixture:
#
#   mockBackend(page, [NOISE, 'flows/foo.yaml'])
#
# Keep this list MINIMAL — if a real flow cares about one of these endpoints,
# override it in the flow's fixture (fixtures merge with later winning).

backend_source:
  - "dashboard/src/composables/useActivityStream.js::global activity SSE"
  - "dashboard/src/composables/useRealtimeStream.js::scheduler SSE"
  - "dashboard/src/stores/notifications.js::unread count badge"
  - "dashboard/src/components/AppLayout.vue::MCP warning toasts SSE"
  - "dashboard/src/stores/auth.js::probe — boot-time GET /api/auth/whoami"

responses:
  "GET /api/notifications/unread-count":
    status: 200
    json: { count: 0 }
  # Boot-time auth probe: the dashboard's auth store calls
  # /api/auth/whoami in App.vue::onMounted to decide whether to render
  # the AuthGate modal. Tests that don't care about auth state want
  # this to report "authenticated" so the modal stays hidden and the
  # actual flow can run uninterrupted. Tests that DO care (the
  # auth-gate-* specs) build their own fixture that overrides this.
  "GET /api/auth/whoami":
    status: 200
    json:
      authenticated: true
      sid: "noise-fixture-sid"
      expires_in: 3600
      abs_expires_in: 36000
  # AuthGate probes on every gate-open to decide whether to render
  # the "Sign in with passkey" button. With whoami=true above the
  # gate is closed, so the probe doesn't normally fire — but a flow
  # that triggers a 401 (logout, key-rotated) re-opens the gate and
  # the probe must have a fixture to land on.
  "GET /api/auth/passkey/has-any":
    status: 200
    json: { has_passkey: false }
  # TeamMonitor.vue onMounted seeds the approvals store via
  # ``approvalsStore.fetchApprovals('pending')``. Any spec that
  # navigates to /monitor (agent-monitor, team-monitor-v2) fires
  # this — default empty so flows that don't assert on approvals
  # see no noise.
  "GET /api/approvals":
    status: 200
    json: []
  "GET /api/approvals/stats":
    status: 200
    json:
      pending: 0
      resolved: 0
      total: 0

sse_streams:
  "/api/agents/activity-stream":
    - { event: "ping", data: {} }
  "/api/scheduler/stream":
    - { event: "ping", data: {} }
  "/api/mcp/events/stream":
    - { event: "ping", data: {} }
