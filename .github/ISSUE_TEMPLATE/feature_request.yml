name: Feature request
description: Propose a new capability, integration, or improvement to Jarvis.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: please skim [open issues](https://github.com/omnigentx/jarvis/issues?q=is%3Aissue+label%3Aenhancement)
        and [Discussions](https://github.com/omnigentx/jarvis/discussions) to avoid duplicates.

        For open-ended ideas without a clear scope, prefer
        [Discussions › Ideas](https://github.com/omnigentx/jarvis/discussions/categories/ideas) —
        we can promote to an issue once direction is settled.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem or limitation are you hitting? Concrete > abstract.
      placeholder: |
        e.g. "When two agents in the same team finish at the same wall-clock second,
        the dashboard merges their turns and I lose track of who said what."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? UI sketch / API shape / config example welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you think about? Why is your proposal better?

  - type: dropdown
    id: component
    attributes:
      label: Component this affects
      multiple: true
      options:
        - backend (FastAPI / fast-agent)
        - dashboard (Flutter web)
        - MCP server (built-in)
        - team templates / orchestrator
        - voice (TTS / STT / wake-word)
        - docker / deploy / CI
        - docs
        - new integration (3rd-party service)
        - other
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope estimate
      description: Rough sense — not binding.
      options:
        - "small: < 1 day, single file"
        - "medium: 1-3 days, several files"
        - "large: > 3 days, new subsystem"
        - "I don't know"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to upstream projects, prior art, screenshots, related issues.

  - type: checkboxes
    id: contribution
    attributes:
      label: Are you willing to contribute?
      options:
        - label: I'd like to send a PR for this myself (with guidance if needed).
