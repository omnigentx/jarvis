version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types:
          - minor
          - patch

  # Vue/Vite dashboard
  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions workflow pins
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  # Base image FROM pins in Dockerfiles
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
