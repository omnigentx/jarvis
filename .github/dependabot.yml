version: 2
updates:
  # Python backend
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types:
          - minor
          - patch

  # Vue/Vite frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Vite major bumps break config/plugin API (verified: v6→v8 PR #39 broke
      # build + e2e CI). Hold majors for separate manual migration PRs.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions workflow pins
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  # Base image FROM pins in Dockerfiles
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
