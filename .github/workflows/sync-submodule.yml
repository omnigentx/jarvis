name: Sync fast-agent submodule

on:
  # Manual trigger
  workflow_dispatch:
  # Auto trigger when fast-agent pushes (requires the webhook set up below)
  repository_dispatch:
    types: [fast-agent-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update submodule to latest
        run: |
          git submodule update --remote backend/fast-agent
          if git diff --quiet; then
            echo "Already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add backend/fast-agent
            git commit -m "chore: sync fast-agent submodule"
            git push
          fi
