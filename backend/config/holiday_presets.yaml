# Holiday Presets for Cron Scheduler
# Each preset provides a ready-made cron expression + calendar_type
# Users can select a preset to quickly create a job from the dashboard
# Note: these defaults target Vietnamese holidays; localize / extend per deployment.

solar_holidays:
  - name: "Hung Kings' Memorial Day (Solar)"
    cron_expr: "0 7 27 4 *"
    description: "Reminder for Hung Kings' Memorial Day, Apr 27"
  - name: "Vietnam National Day"
    cron_expr: "0 7 2 9 *"
    description: "Reminder for Vietnam National Day, Sep 2"
  - name: "Valentine's Day"
    cron_expr: "0 7 14 2 *"
    description: "Reminder for Valentine's Day, Feb 14"
  - name: "Christmas"
    cron_expr: "0 7 25 12 *"
    description: "Reminder for Christmas, Dec 25"
  - name: "International Women's Day"
    cron_expr: "0 7 8 3 *"
    description: "Reminder for International Women's Day, Mar 8"
  - name: "Vietnamese Women's Day"
    cron_expr: "0 7 20 10 *"
    description: "Reminder for Vietnamese Women's Day, Oct 20"
  - name: "Vietnamese Teachers' Day"
    cron_expr: "0 7 20 11 *"
    description: "Reminder for Vietnamese Teachers' Day, Nov 20"

lunar_holidays:
  - name: "Monthly Full Moon"
    cron_expr: "0 7 15 * *"
    description: "Reminder for the 15th of every lunar month (Full Moon)"
  - name: "Monthly New Moon"
    cron_expr: "0 6 1 * *"
    description: "Reminder for the 1st of every lunar month (New Moon)"
  - name: "Hung Kings' Memorial Day (Lunar)"
    cron_expr: "0 7 10 3 *"
    description: "Lunar Mar 10 — Hung Kings' Memorial Day"
  - name: "Kitchen Gods Day"
    cron_expr: "0 6 23 12 *"
    description: "Lunar Dec 23 — Kitchen Gods send-off"
  - name: "Lunar New Year"
    cron_expr: "0 0 1 1 *"
    description: "Lunar Jan 1 — Lunar New Year (Tet) first day"
  - name: "Vu Lan (Ghost Festival)"
    cron_expr: "0 7 15 7 *"
    description: "Lunar Jul 15 — Vu Lan / Ghost Festival"
  - name: "Mid-Autumn Festival"
    cron_expr: "0 7 15 8 *"
    description: "Lunar Aug 15 — Mid-Autumn Festival"
  - name: "Lunar New Year's Eve"
    cron_expr: "0 23 30 12 *"
    description: "Lunar Dec 30 — Lunar New Year's Eve"
