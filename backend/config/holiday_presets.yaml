# Holiday Presets for Cron Scheduler
# Each preset provides a ready-made cron expression + calendar_type
# Users can select a preset to quickly create a job from the dashboard

solar_holidays:
  - name: "Giỗ tổ Hùng Vương (DL)"
    cron_expr: "0 7 27 4 *"
    description: "Nhắc kỷ niệm ngày Giỗ tổ Hùng Vương 27/4"
  - name: "Quốc khánh"
    cron_expr: "0 7 2 9 *"
    description: "Nhắc ngày Quốc khánh 2/9"
  - name: "Valentine"
    cron_expr: "0 7 14 2 *"
    description: "Nhắc Valentine 14/2"
  - name: "Noel"
    cron_expr: "0 7 25 12 *"
    description: "Nhắc Giáng sinh 25/12"
  - name: "Quốc tế Phụ nữ"
    cron_expr: "0 7 8 3 *"
    description: "Nhắc ngày Quốc tế Phụ nữ 8/3"
  - name: "Phụ nữ Việt Nam"
    cron_expr: "0 7 20 10 *"
    description: "Nhắc ngày Phụ nữ Việt Nam 20/10"
  - name: "Ngày Nhà giáo"
    cron_expr: "0 7 20 11 *"
    description: "Nhắc ngày Nhà giáo Việt Nam 20/11"

lunar_holidays:
  - name: "Rằm hàng tháng"
    cron_expr: "0 7 15 * *"
    description: "Nhắc cúng Rằm hàng tháng"
  - name: "Mùng 1 hàng tháng"
    cron_expr: "0 6 1 * *"
    description: "Nhắc thắp hương Mùng 1"
  - name: "Giỗ tổ Hùng Vương (AL)"
    cron_expr: "0 7 10 3 *"
    description: "10/3 âm lịch — Giỗ tổ Hùng Vương"
  - name: "Ông Công Ông Táo"
    cron_expr: "0 6 23 12 *"
    description: "23 tháng Chạp"
  - name: "Tết Nguyên Đán"
    cron_expr: "0 0 1 1 *"
    description: "Mùng 1 Tết"
  - name: "Vu Lan"
    cron_expr: "0 7 15 7 *"
    description: "Rằm tháng 7"
  - name: "Trung Thu"
    cron_expr: "0 7 15 8 *"
    description: "Rằm tháng 8"
  - name: "Giao thừa"
    cron_expr: "0 23 30 12 *"
    description: "Đêm 30 Tết"
