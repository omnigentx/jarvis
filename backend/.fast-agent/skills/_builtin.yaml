# Built-in skills manifest.
#
# Skills listed here ship with the Jarvis codebase. They can be EDITED via the
# UI (so users can fine-tune wording) but cannot be DELETED — code-based agents
# in agent.py reference these names directly, so deleting one would break the
# agent runtime.
#
# When the UI Create flow adds a new skill, it does NOT append to this file.
# Anything in skills/ that is missing from this list is treated as a
# user-created skill and is freely deletable.
#
# Adding/removing entries here is reserved for repo maintainers when the
# shipped skill set changes.
